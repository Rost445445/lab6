name: Deploy static content to Pages

on:
  # Запускаємо деплой при пуші в гілку main
  push:
    branches: ['main']
  # Дозволяє запускати цей workflow вручну з вкладки Actions
  workflow_dispatch:

# Встановлюємо необхідні дозволи для GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Дозволяємо лише один одночасний деплой
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Вказуємо папку, яку генерує Vite
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
